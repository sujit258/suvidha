<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator</title>
<script type="module" src="../../assets/js/shared-ui.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
:root{--bg:#eef2f7;--surface:#fff;--border:#dde3ec;--accent:#1a56db;--accent2:#f59e0b;--text:#1e2a3b;--muted:#6b7a99;--success:#15803d;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center}
.content{width:100%;max-width:520px}
.header{margin-bottom:36px;animation:fadeUp 0.4s ease both}
.eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
h1{font-size:clamp(2rem,5vw,2.6rem);font-weight:600;line-height:1.1;letter-spacing:-0.02em}
h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:13px;margin-top:8px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px;animation:fadeUp 0.4s 0.1s ease both;box-shadow:0 1px 4px rgba(30,42,59,0.06)}
.field{margin-bottom:18px}
.field-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.input-row{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.2s}
.input-row:focus-within{border-color:var(--accent)}
.prefix{font-family:'Space Mono',monospace;font-size:16px;padding:0 12px;color:var(--muted);background:var(--border);height:44px;display:flex;align-items:center;flex-shrink:0}
input[type=number]{flex:1;border:none;background:transparent;padding:11px 14px;font-size:16px;color:var(--text);font-family:'Space Grotesk',sans-serif;outline:none;-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
/* GST rates */
.rate-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.rate-btn{padding:10px 4px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;font-family:'Space Grotesk',sans-serif;cursor:pointer;text-align:center;transition:all 0.15s}
.rate-btn:hover{border-color:var(--accent);color:var(--accent)}
.rate-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* Mode toggle */
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.mode-btn{padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;font-family:'Space Grotesk',sans-serif;cursor:pointer;text-align:center;transition:all 0.15s}
.mode-btn.active{background:#eff6ff;border-color:var(--accent);color:var(--accent)}
/* Result */
.result-card{background:var(--accent);border-radius:10px;padding:20px;color:#fff;margin-bottom:14px}
.result-main-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:4px}
.result-main-val{font-size:clamp(2rem,6vw,2.8rem);font-weight:700;letter-spacing:-0.02em;font-family:'Space Mono',monospace}
.result-rows{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.result-row{background:rgba(255,255,255,0.12);border-radius:8px;padding:12px;text-align:center}
.r-label{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.7;margin-bottom:4px}
.r-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700}
.breakdown{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
.breakdown-row:last-child{border-bottom:none;font-weight:600}
.breakdown-label{color:var(--muted);font-family:'Space Mono',monospace;font-size:12px}
.breakdown-val{font-weight:500;font-family:'Space Mono',monospace;font-size:13px}
.breakdown-val.tax{color:var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="content">
  <div class="header">
    <div class="eyebrow">// Tax Tool</div>
    <h1>GST <span>Calculator</span></h1>
    <p class="sub">Add or reverse GST — CGST + SGST breakdown included</p>
  </div>
  <div class="card">
    <div class="mode-row">
      <button class="mode-btn active" id="modeAdd">Add GST</button>
      <button class="mode-btn" id="modeRemove">Remove GST</button>
    </div>
    <div class="field">
      <div class="field-label">Amount (₹)</div>
      <div class="input-row"><span class="prefix">₹</span><input type="number" id="amount" value="10000" min="0" step="1" placeholder="Enter amount"></div>
    </div>
    <div class="field" style="margin-bottom:0">
      <div class="field-label">GST Rate</div>
      <div class="rate-grid">
        <button class="rate-btn" data-r="5">5%</button>
        <button class="rate-btn" data-r="12">12%</button>
        <button class="rate-btn active" data-r="18">18%</button>
        <button class="rate-btn" data-r="28">28%</button>
        <button class="rate-btn" data-r="custom">⚙</button>
      </div>
      <input type="number" id="customRate" style="display:none;margin-top:10px;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:'Space Grotesk',sans-serif;outline:none" placeholder="Custom rate %" min="0" max="100" step="0.1">
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-main-label" id="resultLabel">Total with GST</div>
    <div class="result-main-val">₹<span id="resultMain">11,800</span></div>
    <div class="result-rows">
      <div class="result-row"><div class="r-label">Base</div><div class="r-val">₹<span id="rBase">10,000</span></div></div>
      <div class="result-row"><div class="r-label">GST</div><div class="r-val">₹<span id="rGst">1,800</span></div></div>
      <div class="result-row"><div class="r-label">Rate</div><div class="r-val"><span id="rRate">18</span>%</div></div>
    </div>
  </div>

  <div class="breakdown" id="breakdown">
    <div class="breakdown-row"><span class="breakdown-label">Base Amount</span><span class="breakdown-val" id="bBase">₹10,000</span></div>
    <div class="breakdown-row"><span class="breakdown-label">CGST (<span id="bCgstPct">9</span>%)</span><span class="breakdown-val tax" id="bCgst">₹900</span></div>
    <div class="breakdown-row"><span class="breakdown-label">SGST (<span id="bSgstPct">9</span>%)</span><span class="breakdown-val tax" id="bSgst">₹900</span></div>
    <div class="breakdown-row"><span class="breakdown-label">Total GST</span><span class="breakdown-val tax" id="bTotalGst">₹1,800</span></div>
    <div class="breakdown-row" style="background:#f0f7ff"><span class="breakdown-label" style="color:var(--text)">Final Amount</span><span class="breakdown-val" style="color:var(--accent);font-size:15px" id="bFinal">₹11,800</span></div>
  </div>
</div>
<script>
let mode='add',rate=18;
const fmtINR=n=>new Intl.NumberFormat('en-IN',{maximumFractionDigits:2}).format(Math.round(n*100)/100);
const f=n=>'₹'+fmtINR(n);

function calculate(){
  const amount=parseFloat(document.getElementById('amount').value)||0;
  let base,gst,total;
  if(mode==='add'){base=amount;gst=base*rate/100;total=base+gst}
  else{total=amount;base=total*100/(100+rate);gst=total-base}
  const half=gst/2;
  document.getElementById('resultLabel').textContent=mode==='add'?'Total with GST':'Base without GST';
  document.getElementById('resultMain').textContent=fmtINR(mode==='add'?total:base);
  document.getElementById('rBase').textContent=fmtINR(base);
  document.getElementById('rGst').textContent=fmtINR(gst);
  document.getElementById('rRate').textContent=rate;
  document.getElementById('bBase').textContent=f(base);
  document.getElementById('bCgstPct').textContent=rate/2;
  document.getElementById('bSgstPct').textContent=rate/2;
  document.getElementById('bCgst').textContent=f(half);
  document.getElementById('bSgst').textContent=f(half);
  document.getElementById('bTotalGst').textContent=f(gst);
  document.getElementById('bFinal').textContent=f(total);
}

document.getElementById('amount').addEventListener('input',calculate);

document.querySelectorAll('.rate-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.rate-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const cr=document.getElementById('customRate');
    if(b.dataset.r==='custom'){cr.style.display='block';rate=parseFloat(cr.value)||0}
    else{cr.style.display='none';rate=parseFloat(b.dataset.r)}
    calculate();
  });
});
document.getElementById('customRate').addEventListener('input',e=>{rate=parseFloat(e.target.value)||0;calculate()});
document.getElementById('modeAdd').addEventListener('click',()=>{mode='add';document.getElementById('modeAdd').classList.add('active');document.getElementById('modeRemove').classList.remove('active');calculate()});
document.getElementById('modeRemove').addEventListener('click',()=>{mode='remove';document.getElementById('modeRemove').classList.add('active');document.getElementById('modeAdd').classList.remove('active');calculate()});

calculate();
</script>
</body>
</html>
