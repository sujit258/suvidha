<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module" src="../../assets/js/shared-ui.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#f5f0eb;--surface:#fff;--border:#e0d8cf;--accent:#4a3728;--accent2:#c0623a;--text:#2c1f14;--muted:#9a8878;--success:#2e7d52;--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center}
.content{width:100%;max-width:640px}
.header{margin-bottom:36px;animation:fadeUp 0.4s ease both}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--accent2);text-transform:uppercase;margin-bottom:10px}
h1{font-size:clamp(2rem,5vw,2.8rem);font-weight:700;line-height:1.1;letter-spacing:-0.02em}
h1 span{color:var(--accent2)}
.sub{color:var(--muted);font-size:14px;margin-top:8px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px;box-shadow:0 2px 12px rgba(74,55,40,0.06);animation:fadeUp 0.4s 0.1s ease both}
.field{margin-bottom:20px}
.field-label{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:flex;justify-content:space-between}
.field-label span{color:var(--accent2);font-size:14px;font-weight:500}
.input-row{display:flex;align-items:center;gap:10px}
.prefix{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:500;color:var(--muted);flex-shrink:0}
input[type=number]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;transition:border-color 0.2s;-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:var(--accent2)}
input[type=range]{width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;-webkit-appearance:none;appearance:none;margin-top:10px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent2);border:3px solid var(--surface);box-shadow:0 1px 4px rgba(0,0,0,0.15);cursor:pointer}
/* Results */
.result-hero{background:var(--accent);border-radius:12px;padding:24px;text-align:center;margin-bottom:20px;color:#fff}
.result-label{font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:0.6;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.result-emi{font-size:clamp(2.2rem,6vw,3.2rem);font-weight:700;letter-spacing:-0.02em;line-height:1}
.result-emi small{font-size:1.2rem;opacity:0.7;font-weight:400}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.result-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px}
.result-box-label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.result-box-val{font-size:20px;font-weight:600;letter-spacing:-0.01em}
.result-box-val.interest{color:var(--accent2)}
.chart-wrap{position:relative;height:200px;margin-bottom:20px}
/* Amortization */
.amort-toggle{font-size:13px;color:var(--accent2);cursor:pointer;text-decoration:underline;font-family:'IBM Plex Mono',monospace;background:none;border:none;margin-bottom:12px;display:block}
.amort-table{display:none;overflow:auto;max-height:280px;border:1px solid var(--border);border-radius:8px}
.amort-table.visible{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;background:var(--accent);color:#fff}
th{padding:10px 12px;text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em}
th:first-child{text-align:left}
td{padding:9px 12px;text-align:right;font-family:'IBM Plex Mono',monospace;border-bottom:1px solid var(--border);font-size:12px}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(0,0,0,0.015)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.results-card{animation:fadeUp 0.4s 0.2s ease both}
</style>
</head>
<body>
<div class="content">
  <div class="header">
    <div class="eyebrow">// Financial Tool</div>
    <h1>EMI <span>Calculator</span></h1>
    <p class="sub">Loan EMI with full amortization schedule</p>
  </div>

  <div class="card">
    <div class="field">
      <div class="field-label">Loan Amount <span id="loanDisplay">₹10,00,000</span></div>
      <div class="input-row"><span class="prefix">₹</span><input type="number" id="loanAmt" value="1000000" min="1000" max="100000000" step="1000"></div>
      <input type="range" id="loanRange" min="10000" max="10000000" value="1000000" step="10000">
    </div>
    <div class="field">
      <div class="field-label">Interest Rate <span id="rateDisplay">8.5% p.a.</span></div>
      <div class="input-row"><input type="number" id="rateAmt" value="8.5" min="1" max="36" step="0.1"><span class="prefix">%</span></div>
      <input type="range" id="rateRange" min="1" max="36" value="8.5" step="0.1">
    </div>
    <div class="field" style="margin-bottom:0">
      <div class="field-label">Loan Tenure <span id="tenureDisplay">20 Years</span></div>
      <div class="input-row"><input type="number" id="tenureAmt" value="20" min="1" max="30" step="1"><span class="prefix">Yrs</span></div>
      <input type="range" id="tenureRange" min="1" max="30" value="20" step="1">
    </div>
  </div>

  <div class="card results-card" id="resultsCard">
    <div class="result-hero">
      <div class="result-label">Monthly EMI</div>
      <div class="result-emi"><small>₹</small><span id="emiVal">0</span></div>
    </div>
    <div class="result-grid">
      <div class="result-box">
        <div class="result-box-label">Principal</div>
        <div class="result-box-val" id="principalVal">₹0</div>
      </div>
      <div class="result-box">
        <div class="result-box-label">Total Interest</div>
        <div class="result-box-val interest" id="interestVal">₹0</div>
      </div>
      <div class="result-box">
        <div class="result-box-label">Total Payment</div>
        <div class="result-box-val" id="totalVal">₹0</div>
      </div>
      <div class="result-box">
        <div class="result-box-label">Interest %</div>
        <div class="result-box-val interest" id="interestPct">0%</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    <button class="amort-toggle" id="amortToggle">▶ Show Amortization Schedule</button>
    <div class="amort-table" id="amortTable">
      <table>
        <thead><tr><th>Month</th><th>EMI</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
        <tbody id="amortBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const loanAmt=document.getElementById('loanAmt'),loanRange=document.getElementById('loanRange'),loanDisplay=document.getElementById('loanDisplay');
const rateAmt=document.getElementById('rateAmt'),rateRange=document.getElementById('rateRange'),rateDisplay=document.getElementById('rateDisplay');
const tenureAmt=document.getElementById('tenureAmt'),tenureRange=document.getElementById('tenureRange'),tenureDisplay=document.getElementById('tenureDisplay');
const emiVal=document.getElementById('emiVal'),principalVal=document.getElementById('principalVal'),interestVal=document.getElementById('interestVal'),totalVal=document.getElementById('totalVal'),interestPct=document.getElementById('interestPct');
const amortToggle=document.getElementById('amortToggle'),amortTable=document.getElementById('amortTable'),amortBody=document.getElementById('amortBody');

function fmtINR(n){return new Intl.NumberFormat('en-IN',{maximumFractionDigits:0}).format(Math.round(n))}
function fmtINRFull(n){return '₹'+fmtINR(n)}

let chart=null;
function initChart(principal,interest){
  const ctx=document.getElementById('myChart').getContext('2d');
  if(chart)chart.destroy();
  chart=new Chart(ctx,{type:'doughnut',data:{labels:['Principal','Interest'],datasets:[{data:[Math.round(principal),Math.round(interest)],backgroundColor:['#4a3728','#c0623a'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{position:'bottom',labels:{font:{family:'IBM Plex Mono',size:11},color:'#9a8878',padding:16}},tooltip:{callbacks:{label:c=>' ₹'+fmtINR(c.raw)}}}}});
}

function calculate(){
  const P=parseFloat(loanAmt.value)||0;
  const r=parseFloat(rateAmt.value)||0;
  const n=parseInt(tenureAmt.value)||0;
  if(P<=0||r<=0||n<=0)return;
  const monthlyRate=r/12/100;
  const months=n*12;
  const emi=P*monthlyRate*Math.pow(1+monthlyRate,months)/(Math.pow(1+monthlyRate,months)-1);
  const total=emi*months;
  const totalInterest=total-P;
  emiVal.textContent=fmtINR(emi);
  principalVal.textContent=fmtINRFull(P);
  interestVal.textContent=fmtINRFull(totalInterest);
  totalVal.textContent=fmtINRFull(total);
  interestPct.textContent=Math.round(totalInterest/total*100)+'%';
  initChart(P,totalInterest);
  // Build amortization
  amortBody.innerHTML='';
  let balance=P;
  for(let m=1;m<=months;m++){
    const intPart=balance*monthlyRate;
    const prinPart=emi-intPart;
    balance=Math.max(0,balance-prinPart);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${m}</td><td>${fmtINR(emi)}</td><td>${fmtINR(prinPart)}</td><td>${fmtINR(intPart)}</td><td>${fmtINR(balance)}</td>`;
    amortBody.appendChild(tr);
  }
}

// Sync inputs ↔ sliders
function sync(input,range,display,fmt){
  input.addEventListener('input',()=>{range.value=input.value;display.textContent=fmt(input.value);calculate()});
  range.addEventListener('input',()=>{input.value=range.value;display.textContent=fmt(range.value);calculate()});
}
sync(loanAmt,loanRange,loanDisplay,v=>'₹'+fmtINR(v));
sync(rateAmt,rateRange,rateDisplay,v=>parseFloat(v).toFixed(1)+'% p.a.');
sync(tenureAmt,tenureRange,tenureDisplay,v=>v+' Year'+(v>1?'s':''));

amortToggle.addEventListener('click',()=>{
  const visible=amortTable.classList.toggle('visible');
  amortToggle.textContent=(visible?'▼ ':'▶ ')+'Show Amortization Schedule';
});

calculate();
</script>
</body>
</html>
