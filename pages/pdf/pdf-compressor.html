<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Compressor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script type="module" src="../../assets/js/shared-ui.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2234;--border:#1e2d45;--accent:#00d4ff;--accent2:#0099bb;--text:#e8f0fe;--muted:#5a7a9a;--success:#10b981;--error:#ef4444;--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.content{position:relative;z-index:1;width:100%;max-width:560px}
.header{margin-bottom:40px;animation:fadeUp 0.4s ease both}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--accent);margin-bottom:12px}
h1{font-size:clamp(2rem,5vw,2.8rem);font-weight:600;line-height:1.1;letter-spacing:-0.02em}
h1 em{font-style:normal;color:var(--accent)}
.sub{color:var(--muted);font-size:14px;margin-top:8px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px;animation:fadeUp 0.4s 0.1s ease both}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;background:var(--surface2)}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(0,212,255,0.04)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:26px;margin-bottom:10px}
.drop-title{font-size:14px;font-weight:500;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.file-info{display:none;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-top:14px}
.file-info.visible{display:flex}
.file-icon{width:36px;height:36px;background:rgba(0,212,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.file-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0}
.settings{margin-top:20px}
.setting-label{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.setting-label span{color:var(--accent);font-size:13px}
.quality-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.q-btn{padding:10px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;text-align:center;transition:all 0.15s}
.q-btn:hover{border-color:var(--accent);color:var(--text)}
.q-btn.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent);font-weight:500}
.q-btn small{display:block;font-size:10px;font-family:'JetBrains Mono',monospace;margin-top:2px;opacity:0.7}
.btn{width:100%;padding:13px;background:var(--accent);color:#0a0f1e;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;margin-top:16px;transition:all 0.2s}
.btn:hover{background:#00b8d9;transform:translateY(-1px)}
.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.progress-wrap{display:none;margin-top:14px}
.progress-wrap.visible{display:block}
.progress-label{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width 0.3s;width:0%}
.result-stats{display:none;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.result-stats.visible{display:grid}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-val{font-size:17px;font-weight:600;color:var(--accent);font-family:'JetBrains Mono',monospace}
.stat-val.good{color:var(--success)}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
.status{display:none;align-items:center;gap:8px;padding:11px 14px;border-radius:8px;font-size:13px;margin-top:12px;font-family:'JetBrains Mono',monospace}
.status.visible{display:flex}
.status.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:var(--error)}
.dl-btn{display:none;width:100%;padding:12px;background:transparent;color:var(--success);border:1px solid rgba(16,185,129,0.4);border-radius:8px;font-size:14px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;margin-top:10px;text-align:center;text-decoration:none;align-items:center;justify-content:center;gap:8px;transition:background 0.2s}
.dl-btn.visible{display:flex}
.dl-btn:hover{background:rgba(16,185,129,0.08)}
.reset{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;font-family:'JetBrains Mono',monospace;background:none;border:none;margin-top:10px;display:block;text-align:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="content">
  <div class="header">
    <div class="eyebrow">// tool_03 — pdf.compress()</div>
    <h1>PDF <em>Compressor</em></h1>
    <p class="sub">Reduce PDF file size. Runs entirely in your browser.</p>
  </div>
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf" id="fileInput">
      <div class="drop-icon">📄</div>
      <div class="drop-title">Drop your PDF here</div>
      <div class="drop-sub">or click to browse</div>
    </div>
    <div class="file-info" id="fileInfo">
      <div class="file-icon">📄</div>
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <div class="settings">
      <div class="setting-label">Quality <span id="qualLabel">Medium</span></div>
      <div class="quality-grid">
        <button class="q-btn" data-q="0.5" data-label="Low">Low<small>max compress</small></button>
        <button class="q-btn active" data-q="0.75" data-label="Medium">Medium<small>balanced</small></button>
        <button class="q-btn" data-q="0.92" data-label="High">High<small>best quality</small></button>
      </div>
    </div>
    <button class="btn" id="compressBtn" disabled>Compress PDF</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label"><span id="progressLabel">Processing…</span><span id="progressPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="result-stats" id="resultStats">
      <div class="stat"><div class="stat-val" id="statOrig">—</div><div class="stat-label">Original</div></div>
      <div class="stat"><div class="stat-val good" id="statNew">—</div><div class="stat-label">Compressed</div></div>
      <div class="stat"><div class="stat-val good" id="statSaved">—</div><div class="stat-label">Saved</div></div>
    </div>
    <div class="status error" id="statusError"><span>✕</span><span id="errorMsg"></span></div>
    <a class="dl-btn" id="dlBtn">⬇ Download Compressed PDF</a>
    <button class="reset" id="resetBtn" style="display:none">↺ Start over</button>
  </div>
</div>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),fileInfo=document.getElementById('fileInfo'),fileName=document.getElementById('fileName'),fileSize=document.getElementById('fileSize'),compressBtn=document.getElementById('compressBtn'),progressWrap=document.getElementById('progressWrap'),progressLabel=document.getElementById('progressLabel'),progressPct=document.getElementById('progressPct'),progressFill=document.getElementById('progressFill'),resultStats=document.getElementById('resultStats'),statOrig=document.getElementById('statOrig'),statNew=document.getElementById('statNew'),statSaved=document.getElementById('statSaved'),statusError=document.getElementById('statusError'),errorMsg=document.getElementById('errorMsg'),dlBtn=document.getElementById('dlBtn'),resetBtn=document.getElementById('resetBtn'),qualLabel=document.getElementById('qualLabel');
let selectedFile=null,quality=0.75;
function fmt(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(2)+'MB'}
function setProgress(pct,label){progressFill.style.width=pct+'%';progressPct.textContent=Math.round(pct)+'%';if(label)progressLabel.textContent=label}
function hideAll(){progressWrap.classList.remove('visible');resultStats.classList.remove('visible');statusError.classList.remove('visible');dlBtn.classList.remove('visible')}
function showError(m){hideAll();errorMsg.textContent=m;statusError.classList.add('visible')}
function setFile(f){if(!f||(!f.type.includes('pdf')&&!f.name.endsWith('.pdf'))){showError('Please select a PDF file.');return}selectedFile=f;fileName.textContent=f.name;fileSize.textContent=fmt(f.size);fileInfo.classList.add('visible');compressBtn.disabled=false;hideAll();resetBtn.style.display='none'}
fileInput.addEventListener('change',e=>{if(e.target.files[0])setFile(e.target.files[0])});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('over');if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0])});
document.querySelectorAll('.q-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.q-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');quality=parseFloat(b.dataset.q);qualLabel.textContent=b.dataset.label})});
resetBtn.addEventListener('click',()=>{selectedFile=null;fileInput.value='';fileInfo.classList.remove('visible');compressBtn.disabled=true;hideAll();resetBtn.style.display='none'});
compressBtn.addEventListener('click',async()=>{
  if(!selectedFile)return;
  hideAll();compressBtn.disabled=true;progressWrap.classList.add('visible');setProgress(0,'Loading PDF…');
  try{
    const origSize=selectedFile.size;
    const buf=await selectedFile.arrayBuffer();
    let pdfDoc;try{pdfDoc=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise}catch(e){showError('Cannot open this PDF.');compressBtn.disabled=false;return}
    const total=pdfDoc.numPages;
    const {PDFDocument}=PDFLib;
    const outDoc=await PDFDocument.create();
    for(let i=1;i<=total;i++){
      setProgress(5+(i-1)/total*85,`Rendering page ${i} of ${total}…`);
      const page=await pdfDoc.getPage(i);
      const vp=page.getViewport({scale:1.5});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width;canvas.height=vp.height;
      const ctx=canvas.getContext('2d');
      await page.render({canvasContext:ctx,viewport:vp}).promise;
      const dataUrl=canvas.toDataURL('image/jpeg',quality);
      const b64=dataUrl.split(',')[1];
      const imgBytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
      const jpg=await outDoc.embedJpg(imgBytes);
      const p=outDoc.addPage([vp.width/1.5,vp.height/1.5]);
      p.drawImage(jpg,{x:0,y:0,width:vp.width/1.5,height:vp.height/1.5});
    }
    setProgress(97,'Saving…');
    const bytes=await outDoc.save();
    setProgress(100,'Done!');
    const newSize=bytes.length;
    const saved=Math.max(0,origSize-newSize);
    const pct=origSize>0?Math.round(saved/origSize*100):0;
    statOrig.textContent=fmt(origSize);statNew.textContent=fmt(newSize);statSaved.textContent=pct+'%';
    progressWrap.classList.remove('visible');resultStats.classList.add('visible');
    const blob=new Blob([bytes],{type:'application/pdf'});
    dlBtn.href=URL.createObjectURL(blob);
    dlBtn.download=selectedFile.name.replace(/\.pdf$/i,'')+'_compressed.pdf';
    dlBtn.classList.add('visible');resetBtn.style.display='block';compressBtn.disabled=false;
  }catch(e){showError('Error: '+(e.message||'Unknown'));compressBtn.disabled=false}
});
</script>
</body>
</html>
