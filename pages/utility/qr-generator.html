<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module" src="../../assets/js/shared-ui.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600&family=Courier+Prime:wght@400;700&display=swap');
:root{--bg:#f9f6f1;--surface:#fff;--border:#e8e2d8;--accent:#18181b;--accent2:#dc2626;--text:#18181b;--muted:#78716c;--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',sans-serif;min-height:100vh;padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center}
.content{width:100%;max-width:500px}
.header{margin-bottom:36px;animation:fadeUp 0.4s ease both}
.eyebrow{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:0.12em;color:var(--accent2);text-transform:uppercase;margin-bottom:10px}
h1{font-size:clamp(2rem,5vw,2.8rem);font-weight:600;line-height:1.1;letter-spacing:-0.03em}
h1 span{color:var(--accent2)}
.sub{color:var(--muted);font-size:13px;margin-top:8px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px;animation:fadeUp 0.4s 0.1s ease both;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
/* Type tabs */
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px}
.tab{padding:9px 4px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;text-align:center;font-weight:500;transition:all 0.15s}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-family:'Courier Prime',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
input[type=text],input[type=url],input[type=tel],textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);font-family:'Bricolage Grotesque',sans-serif;outline:none;transition:border-color 0.2s;resize:vertical}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:90px}
/* QR output */
.qr-wrap{display:none;flex-direction:column;align-items:center;gap:16px;padding:24px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.qr-wrap.visible{display:flex}
#qrOutput{background:#fff;padding:12px;border-radius:8px;border:1px solid var(--border)}
#qrOutput img,#qrOutput canvas{display:block}
.qr-size-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.qr-size-row input{width:100px}
.dl-row{display:flex;gap:10px;width:100%}
.dl-btn{flex:1;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;text-align:center;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.dl-btn:hover{background:#27272a}
.dl-btn.outline{background:transparent;color:var(--accent);border:1px solid var(--border)}
.dl-btn.outline:hover{background:var(--bg)}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;transition:all 0.2s}
.btn:hover{background:#27272a;transform:translateY(-1px)}
.panel{display:none}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="content">
  <div class="header">
    <div class="eyebrow">// Utility Tool</div>
    <h1>QR Code <span>Generator</span></h1>
    <p class="sub">URL · Text · UPI · Contact — download as PNG or SVG</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" data-t="url">URL</button>
      <button class="tab" data-t="text">Text</button>
      <button class="tab" data-t="upi">UPI</button>
      <button class="tab" data-t="contact">Contact</button>
    </div>

    <!-- URL -->
    <div class="panel active" id="panel-url">
      <div class="field"><label>Website URL</label><input type="url" id="urlInput" placeholder="https://example.com" value="https://example.com"></div>
    </div>
    <!-- Text -->
    <div class="panel" id="panel-text">
      <div class="field"><label>Text / Message</label><textarea id="textInput" placeholder="Enter any text…"></textarea></div>
    </div>
    <!-- UPI -->
    <div class="panel" id="panel-upi">
      <div class="field"><label>UPI ID</label><input type="text" id="upiId" placeholder="name@upi"></div>
      <div class="field"><label>Name</label><input type="text" id="upiName" placeholder="Your Name"></div>
      <div class="field"><label>Amount (optional ₹)</label><input type="text" id="upiAmt" placeholder="Leave blank for any amount"></div>
    </div>
    <!-- Contact -->
    <div class="panel" id="panel-contact">
      <div class="field"><label>Full Name</label><input type="text" id="cName" placeholder="Sujeet Kothari"></div>
      <div class="field"><label>Phone</label><input type="tel" id="cPhone" placeholder="+91 98765 43210"></div>
      <div class="field"><label>Email</label><input type="text" id="cEmail" placeholder="name@email.com"></div>
    </div>

    <button class="btn" id="genBtn">Generate QR Code</button>
  </div>

  <div class="card" id="outputCard" style="display:none">
    <div class="qr-wrap visible" id="qrWrap">
      <div id="qrOutput"></div>
      <div class="qr-size-row">
        <span>Size:</span>
        <input type="range" id="sizeSlider" min="128" max="400" value="200" step="8">
        <span id="sizeVal">200px</span>
      </div>
      <div class="dl-row">
        <a class="dl-btn" id="dlPng">⬇ PNG</a>
        <button class="dl-btn outline" id="copyBtn">⧉ Copy</button>
      </div>
    </div>
  </div>
</div>
<script>
let currentType='url',qr=null,currentSize=200;

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');currentType=t.dataset.t;
    document.getElementById('panel-'+currentType).classList.add('active');
  });
});

function getData(){
  if(currentType==='url')return document.getElementById('urlInput').value.trim();
  if(currentType==='text')return document.getElementById('textInput').value.trim();
  if(currentType==='upi'){
    const id=document.getElementById('upiId').value.trim();
    const name=document.getElementById('upiName').value.trim();
    const amt=document.getElementById('upiAmt').value.trim();
    if(!id)return null;
    let s=`upi://pay?pa=${encodeURIComponent(id)}`;
    if(name)s+=`&pn=${encodeURIComponent(name)}`;
    if(amt)s+=`&am=${amt}`;
    s+='&cu=INR';return s;
  }
  if(currentType==='contact'){
    const n=document.getElementById('cName').value.trim();
    const p=document.getElementById('cPhone').value.trim();
    const e=document.getElementById('cEmail').value.trim();
    if(!n&&!p)return null;
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\nEMAIL:${e}\nEND:VCARD`;
  }
  return null;
}

function generate(){
  const data=getData();
  if(!data){alert('Please fill in the required fields.');return}
  document.getElementById('outputCard').style.display='block';
  document.getElementById('qrOutput').innerHTML='';
  qr=new QRCode(document.getElementById('qrOutput'),{text:data,width:currentSize,height:currentSize,colorDark:'#18181b',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  setTimeout(setupDownload,300);
}

function setupDownload(){
  const canvas=document.querySelector('#qrOutput canvas');
  if(!canvas)return;
  const dlPng=document.getElementById('dlPng');
  dlPng.href=canvas.toDataURL('image/png');
  dlPng.download='qrcode.png';
}

document.getElementById('genBtn').addEventListener('click',generate);

document.getElementById('sizeSlider').addEventListener('input',e=>{
  currentSize=parseInt(e.target.value);
  document.getElementById('sizeVal').textContent=currentSize+'px';
  if(qr)generate();
});

document.getElementById('copyBtn').addEventListener('click',async()=>{
  const canvas=document.querySelector('#qrOutput canvas');
  if(!canvas)return;
  canvas.toBlob(async blob=>{try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);document.getElementById('copyBtn').textContent='✓ Copied!';}catch(e){document.getElementById('copyBtn').textContent='Copy failed';}setTimeout(()=>document.getElementById('copyBtn').textContent='⧉ Copy',2000);});
});

generate();
</script>
</body>
</html>
